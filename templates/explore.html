{% extends 'layout.html' %}

{% block content %}

<h1>Explore the Data</h1>
<p>What do you want to find out about the FLOW project?
Select a metric to visualize how the project impacted participants over time.
</p>

<div class="controls">
    <label for="metricSelect">Metric:</label>
    <select id="metricSelect">
        {% for key, label in metrics.items() %}
            <option value="{{ key }}">{{ label }}</option>
        {% endfor %}
    </select>
</div>

<div id="metricDescription" class="description-box"></div>

<div id="chart"></div>

<script>
    function drawChart(metric) {
        fetch('/api/data?metric=' + metric)
            .then(response => response.json())
            .then(data => {

                const traces = [];

                const timepoints = [
                    { key: 'pre',      label: 'Pretest'   },
                    { key: 'post',     label: 'Posttest'  },
                    { key: 'followup', label: 'Follow-up' }
                ];

                for (const tp of timepoints) {
                    const xValues = [];
                    const yValues = [];
                    const color   = data.colors[tp.key];

                    for (const code in data.groups) {
                        const group  = data.groups[code];
                        const scores = group[tp.key];

                        if (scores.length > 0) {
                            xValues.push(...Array(scores.length).fill(group.label));
                            yValues.push(...scores);
                        }
                    }

                    if (yValues.length > 0) {
                        traces.push({
                            type: 'box',
                            name: tp.label,
                            x: xValues,
                            y: yValues,
                            marker: {
                                color: color,
                                size: 4,
                                opacity: 1.0
                            },
                            fillcolor: color + '80',
                            line: { color: color },
                            boxpoints: 'all',
                            jitter: 0.4,
                            pointpos: 0,
                            legendgroup: tp.label,
                            showlegend: true
                        });
                    }
                }

                const layout = {
                    title: data.label,
                    xaxis: {
                        //title: 'Group',
                        categoryorder: 'array',
                        categoryarray: ['Citizen Scientists', 'Waiting Control', 'Panel Control'],
                    },
                    yaxis: {
                        title: 'Score',
                    },
                    boxmode: 'group',
                    paper_bgcolor: '#ffffff',
                    plot_bgcolor: '#ffffff',
                    font: { family: 'Montserrat, sans-serif' },
                };

                Plotly.newPlot('chart', traces, layout);

                // Add significance annotations and lines
                const annotations = [];
                const shapes = [];
                const groupOrder = ['Citizen Scientists', 'Waiting Control', 'Panel Control'];

                // 1. Calculate max Y across all data groups to position brackets perfectly above everything
                let maxY = 0;
                for (const code in data.groups) {
                    const group = data.groups[code];
                    const allScores = [...group.pre, ...group.post, ...group.followup];
                    if (allScores.length > 0) {
                        const groupMax = Math.max(...allScores);
                        if (groupMax > maxY) maxY = groupMax;
                    }
                }

                // Base height slightly above the highest point found in the dataset
                const bracketBase = maxY + (maxY * 0.05); 
                const bracketStep = maxY * 0.08; // Vertical spacing buffer between comparisons

                for (const code in data.groups) {
                    const group = data.groups[code];
                    const gIdx  = groupOrder.indexOf(group.label);
                    
                    if (gIdx === -1) continue; // Skip if group isn't tracked in groupOrder

                    // Define the specific sub-box X-offsets for this group cluster
                    const xPre  = gIdx - 0.2;
                    const xPost = gIdx;
                    const xFu   = gIdx + 0.2;

                    // --- Pre vs Post ---
                    const prePost = group.stats.pre_vs_post;
                    if (prePost && prePost.star !== 'ns') {
                        const yLevel = bracketBase;

                        // Draw horizontal line between Pre and Post boxes
                        shapes.push({
                            type: 'line',
                            xref: 'x', yref: 'y',
                            x0: xPre, y0: yLevel,
                            x1: xPost, y1: yLevel,
                            line: { color: '#555', width: 1.5 }
                        });

                        // Anchor star right over the center of the line segment
                        annotations.push({
                            x: (xPre + xPost) / 2,
                            y: yLevel,
                            text: prePost.star,
                            showarrow: false,
                            font: { size: 14, color: '#333', family: 'Montserrat, sans-serif' },
                            yshift: 6, // Pushes text slightly above the physical line
                            hovertext: `Pre vs Post: p = ${prePost.p}`,
                        });
                    }

                    // --- Pre vs Follow-up ---
                    const preFu = group.stats.pre_vs_followup;
                    if (preFu && preFu.star !== 'ns' && group.followup.length > 0) {
                        // Stack this comparison cleanly above the Pre vs Post line
                        const yLevel = bracketBase + bracketStep;

                        // Draw horizontal line between Pre and Follow-up boxes
                        shapes.push({
                            type: 'line',
                            xref: 'x', yref: 'y',
                            x0: xPre, y0: yLevel,
                            x1: xFu, y1: yLevel,
                            line: { color: '#555', width: 1.5 }
                        });

                        // Anchor star over the center of the span
                        annotations.push({
                            x: (xPre + xFu) / 2,
                            y: yLevel,
                            text: preFu.star,
                            showarrow: false,
                            font: { size: 14, color: '#333', family: 'Montserrat, sans-serif' },
                            yshift: 6,
                            hovertext: `Pre vs Follow-up: p = ${preFu.p}`,
                        });
                    }
                }

                // Update layout with both our shapes (lines) and annotations (stars + tooltips)
                Plotly.relayout('chart', { 
                    annotations: annotations,
                    shapes: shapes,
                    // Give the Y-axis headroom so your highest bracket doesn't slice off the chart
                    'yaxis.range': [0, bracketBase + (bracketStep * 2)]
                });

                // --- RESTORED LINE HERE ---
                document.getElementById('metricDescription').innerHTML = data.description;
            });
    }

    drawChart(document.getElementById('metricSelect').value);

    document.getElementById('metricSelect').addEventListener('change', function() {
        drawChart(this.value);
    });
</script>

{% endblock %}
