{% extends 'layout.html' %}

{% block content %}

<h1>Explore the Data</h1>
<p>What do you want to find out about the FLOW project?
Select a metric to visualize how the project impacted participants over time.
</p>

<!-- Metric selector dropdown -->
<div class="controls">
    <label for="metricSelect">Metric:</label>
    <select id="metricSelect">
        {% for key, label in metrics.items() %}
            <option value="{{ key }}">{{ label }}</option>
        {% endfor %}
    </select>
</div>

<!-- Metric description to know where the socres come from-->
<div id="metricDescription" class="description-box"></div>

<!-- Drawing my Plotly chart  -->
<div id="chart"></div>

<script>
    function drawChart(metric) {
        fetch('/api/data?metric=' + metric)
            .then(response => response.json())
            .then(data => {

                const traces = [];

                const timepoints = [
                    { key: 'pre',      label: 'Pretest'   },
                    { key: 'post',     label: 'Posttest'  },
                    { key: 'followup', label: 'Follow-up' }
                ];

                for (const tp of timepoints) {
                    const xValues = [];
                    const yValues = [];
                    const color   = data.colors[tp.key];

                    for (const code in data.groups) {
                        const group  = data.groups[code];
                        const scores = group[tp.key];

                        if (scores.length > 0) {
                            xValues.push(...Array(scores.length).fill(group.label));
                            yValues.push(...scores);
                        }
                    }

                    if (yValues.length > 0) {
                        traces.push({
                            type: 'box',
                            name: tp.label,
                            x: xValues,
                            y: yValues,
                            marker: {
                                color: color,
                                size: 4,
                                opacity: 1.0
                            },
                            fillcolor: color + '80',
                            line: { color: color },
                            boxpoints: 'all',
                            jitter: 0.4,
                            pointpos: 0,
                            legendgroup: tp.label,
                            showlegend: true
                        });
                    }
                }

                const layout = {
                    title: data.label,
                    xaxis: {
                        title: 'Group',
                        categoryorder: 'array',
                        categoryarray: ['Citizen Scientists', 'Waiting Control', 'Panel Control'],
                    },
                    yaxis: {
                        title: 'Score',
                    },
                    boxmode: 'group',
                    paper_bgcolor: '#ffffff',
                    plot_bgcolor: '#ffffff',
                    font: { family: 'Montserrat, sans-serif' },
                };

                Plotly.newPlot('chart', traces, layout);
                // Show metric description
                document.getElementById('metricDescription').innerHTML = data.description;
            });
    }

    drawChart(document.getElementById('metricSelect').value);

    document.getElementById('metricSelect').addEventListener('change', function() {
        drawChart(this.value);
    });
</script>

{% endblock %}
